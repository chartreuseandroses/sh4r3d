<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}sh4r3d{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #21263a;
      --border: #2a2f45;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --danger: #e05555;
      --danger-hover: #f06060;
      --success: #40c07a;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    .site-header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .site-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.03em;
    }

    .site-logo span { color: var(--text); }

    .site-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.15s;
    }

    .site-nav a:hover { color: var(--text); }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.925rem;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input:focus { border-color: var(--accent); }
    .input.error { border-color: var(--danger); }

    .field-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .field-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 0.4rem;
      display: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .alert {
      border-radius: 7px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .alert-error {
      background: rgba(224,85,85,0.12);
      border: 1px solid rgba(224,85,85,0.35);
      color: #f08080;
    }

    .progress-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 0.6rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.2s;
      width: 0%;
    }

    .progress-bar-fill.full { background: var(--danger); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-accent {
      background: rgba(108,99,255,0.18);
      color: var(--accent-hover);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">sh<span>4</span>r3d</a>
    <nav class="site-nav">
      {% if beta_mode %}<a href="/auth/logout">Sign out</a>{% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
