<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sh4r3d</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <script src="/qrcode.min.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">sh<span>4</span>r3d</a>
    <nav class="site-nav" id="site-nav"></nav>
  </header>
  <main class="container">
    <div class="card" style="margin-bottom:1.25rem">
      <h1 style="margin-bottom:0.25rem" id="slug-title">Loading…</h1>
      <p class="subtitle" id="expiry-text">Loading expiry…</p>

      <label>Share link</label>
      <div style="display:flex;gap:0.6rem;align-items:center">
        <input class="input" type="text" id="share-url" readonly style="flex:1;cursor:pointer;color:var(--accent)">
        <button class="btn btn-ghost" id="copy-btn" onclick="copyLink()">Copy</button>
      </div>

      <details id="qr-details" style="margin-top:0.75rem">
        <summary style="cursor:pointer;user-select:none;font-size:0.875rem;color:var(--accent);list-style:none">Show QR code</summary>
        <div id="qr-code" style="margin-top:0.75rem;display:inline-block"></div>
      </details>
    </div>

    <div class="card" style="margin-bottom:1.25rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
        <span style="font-size:0.875rem;font-weight:600">Storage</span>
        <span id="storage-text" style="font-size:0.85rem;color:var(--muted)">—</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="storage-bar"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1.25rem">
      <h1 style="font-size:1.2rem;margin-bottom:0.5rem">Share a note</h1>
      <p class="subtitle" style="margin-bottom:1rem">Paste text or a URL. URLs automatically show a link preview.</p>

      <textarea
        id="note-input"
        class="input"
        rows="3"
        placeholder="Type something, or paste a URL…"
        style="resize:vertical;font-family:inherit"
      ></textarea>

      <div style="margin-top:0.6rem;display:flex;gap:0.6rem;align-items:center">
        <button class="btn btn-primary" id="note-btn" onclick="submitNote()">Share</button>
        <span id="note-hint" style="font-size:0.8rem;color:var(--muted)"></span>
      </div>

      <div id="note-error" class="alert alert-error" style="display:none;margin-top:0.75rem"></div>

      <div id="notes-section" style="display:none">
        <hr class="divider">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <span style="font-size:0.875rem;font-weight:600">Notes</span>
          <span id="note-count" style="font-size:0.8rem;color:var(--muted)"></span>
        </div>
        <div id="note-list"></div>
      </div>
    </div>

    <div class="card">
      <h1 style="font-size:1.2rem;margin-bottom:1.25rem">Upload files</h1>

      <div
        id="drop-zone"
        style="
          border:2px dashed var(--border);
          border-radius:var(--radius);
          padding:2.5rem 1.5rem;
          text-align:center;
          cursor:pointer;
          transition:border-color 0.15s,background 0.15s;
          margin-bottom:1.5rem;
        "
      >
        <div style="font-size:2rem;margin-bottom:0.5rem">&#x2601;&#xfe0f;</div>
        <p style="color:var(--muted);font-size:0.9rem">Drag files here or <span style="color:var(--accent);text-decoration:underline;cursor:pointer">browse</span></p>
        <input type="file" id="file-input" multiple style="display:none">
      </div>

      <div id="upload-status" style="display:none;margin-bottom:1rem">
        <p id="upload-filename" style="font-size:0.875rem;color:var(--muted);margin-bottom:0.3rem"></p>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="upload-bar"></div>
        </div>
        <p id="upload-msg" style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem"></p>
      </div>

      <div id="upload-error" class="alert alert-error" style="display:none"></div>

      <hr class="divider">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.875rem;font-weight:600">Files</span>
        <span id="file-count" style="font-size:0.8rem;color:var(--muted)"></span>
      </div>

      <div id="file-list">
        <p style="color:var(--muted);font-size:0.875rem;text-align:center;padding:1rem 0">No files yet.</p>
      </div>
    </div>
  </main>

  <script>
    const SLUG = window.location.pathname.slice(1).replace(/\/$/, '');
    const MAX_BYTES = 500 * 1024 * 1024;
    let EXPIRES = null;

    // Initialise: check auth, then load slug data
    async function init() {
      const {authenticated, beta_mode} = await fetch('/api/auth/status').then(r => r.json());

      if (beta_mode) {
        document.getElementById('site-nav').innerHTML = '<a href="#" onclick="signOut()">Sign out</a>';
      }

      if (beta_mode && !authenticated) {
        window.location.href = `/auth?next=${encodeURIComponent(window.location.pathname)}`;
        return;
      }

      if (!SLUG) {
        window.location.href = '/';
        return;
      }

      const shareUrl = window.location.origin + '/' + SLUG;
      document.getElementById('slug-title').textContent = SLUG;
      document.getElementById('share-url').value = shareUrl;
      document.title = `sh4r3d — ${SLUG}`;

      if (new URLSearchParams(window.location.search).get('copy') === '1') {
        history.replaceState(null, '', '/' + SLUG);
        navigator.clipboard.writeText(shareUrl).then(function() {
          const btn = document.getElementById('copy-btn');
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        }).catch(function() {});
      }

      await refreshFiles();

      // Poll every 3s while the tab is visible, 30s when hidden
      let pollTimer;
      function schedulePoll() {
        clearTimeout(pollTimer);
        pollTimer = setTimeout(async () => {
          await refreshFiles();
          schedulePoll();
        }, document.hidden ? 30000 : 3000);
      }
      schedulePoll();
      document.addEventListener('visibilitychange', schedulePoll);
    }

    function signOut() {
      fetch('/api/auth/logout', {method: 'POST'}).then(() => {
        window.location.href = '/auth';
      });
    }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('share-url').value).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    function updateExpiry() {
      if (!EXPIRES) return;
      const diff = EXPIRES - Date.now() / 1000;
      const el = document.getElementById('expiry-text');
      const exp = new Date(EXPIRES * 1000);
      const now = new Date();
      const timeStr = exp.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      const dayStr = exp.toDateString() === now.toDateString()
        ? 'today'
        : exp.toDateString() === new Date(now.getTime() + 86400000).toDateString()
        ? 'tomorrow'
        : exp.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
      if (diff < 3600) {
        const m = Math.floor(diff / 60);
        const s = Math.floor(diff % 60);
        el.textContent = 'Expires ' + dayStr + ' at ' + timeStr + ' (' + m + 'm ' + s + 's)';
      } else {
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        el.textContent = 'Expires ' + dayStr + ' at ' + timeStr + ' (' + h + 'h ' + m + 'm)';
      }
    }

    function scheduleExpiryUpdate() {
      const delay = (EXPIRES - Date.now() / 1000) < 3600 ? 5000 : 60000;
      setTimeout(function() { updateExpiry(); scheduleExpiryUpdate(); }, delay);
    }

    function fmtBytes(b) {
      if (b < 1024) return `${b} B`;
      if (b < 1024 * 1024) return `${(b / 1024).toFixed(1)} KB`;
      return `${(b / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','avif','svg','bmp']);
    const VIDEO_EXTS = new Set(['mp4','webm','ogg','mov']);

    function mediaType(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (IMAGE_EXTS.has(ext)) return 'image';
      if (VIDEO_EXTS.has(ext)) return 'video';
      return null;
    }

    function mediaEmbed(f) {
      const type = mediaType(f.original_name);
      if (!type) return '';
      const src = `/api/slugs/${SLUG}/files/${f.id}/download`;
      if (type === 'image') {
        return `<div class="media-embed"><img src="${src}" alt="${escHtml(f.original_name)}" loading="lazy"></div>`;
      }
      // Videos: src is set asynchronously via loadVideoSources() to avoid iOS redirect issues
      return `<div class="media-embed media-embed-video"><video data-file-id="${f.id}" controls playsinline preload="metadata"></video></div>`;
    }

    async function loadVideoSources() {
      const videos = document.querySelectorAll('video[data-file-id]');
      for (const el of videos) {
        if (el.src) continue; // already resolved
        const fileId = el.dataset.fileId;
        try {
          const res = await fetch(`/api/slugs/${SLUG}/files/${fileId}/download?direct=1`);
          const { url } = await res.json();
          el.src = url;
        } catch {}
      }
    }

    function copyMd5(hash, el) {
      navigator.clipboard.writeText(hash).then(() => {
        const orig = el.textContent;
        el.textContent = 'Copied!';
        setTimeout(() => { el.textContent = orig; }, 2000);
      });
    }

    function renderFiles(files, storageUsed) {
      const listEl    = document.getElementById('file-list');
      const countEl   = document.getElementById('file-count');
      const barEl     = document.getElementById('storage-bar');
      const storageEl = document.getElementById('storage-text');

      const pct = Math.min(100, (storageUsed / MAX_BYTES) * 100);
      barEl.style.width = `${pct.toFixed(1)}%`;
      barEl.classList.toggle('full', pct >= 95);
      storageEl.textContent = `${fmtBytes(storageUsed)} / 500 MB`;

      countEl.textContent = files.length === 1 ? '1 file' : `${files.length} files`;

      if (!files.length) {
        listEl.innerHTML = `<p style="color:var(--muted);font-size:0.875rem;text-align:center;padding:1rem 0">No files yet.</p>`;
        return;
      }

      listEl.innerHTML = files.map(f => `
        <div style="padding:0.7rem 0;border-bottom:1px solid var(--border)" data-file-id="${f.id}">
          <div style="display:flex;align-items:flex-start;gap:0.75rem">
            <div style="flex:1;min-width:0">
              <p style="font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(f.original_name)}">${escHtml(f.original_name)}</p>
              <p style="font-size:0.775rem;color:var(--muted);margin-top:0.15rem">${fmtBytes(f.size_bytes)}</p>
              ${f.md5 ? `<p class="md5-hash" style="font-size:0.7rem;color:var(--muted);margin-top:0.15rem;font-family:monospace;cursor:pointer" title="Click to copy MD5" onclick="copyMd5('${f.md5}', this)">MD5: ${f.md5}</p>` : ''}
            </div>
            <a class="btn btn-ghost" href="/api/slugs/${SLUG}/files/${f.id}/download">Download</a>
            <button class="btn btn-danger" onclick="deleteFile('${f.id}', this)">Delete</button>
          </div>
          ${mediaEmbed(f)}
        </div>
      `).join('');
    }

    let lastFilesJson = null;
    let lastNotesJson = null;

    async function refreshFiles() {
      try {
        const res = await fetch(`/api/slugs/${SLUG}`);
        if (res.status === 404) {
          window.location.href = '/404.html';
          return;
        }
        if (!res.ok) return;
        const data = await res.json();
        if (EXPIRES === null) {
          EXPIRES = data.expires_at;
          updateExpiry();
          scheduleExpiryUpdate();
        }

        // Only re-render if data changed — avoids destroying <video> elements mid-playback
        const filesJson = JSON.stringify(data.files);
        if (filesJson !== lastFilesJson) {
          lastFilesJson = filesJson;
          renderFiles(data.files, data.storage_used_bytes);
          loadVideoSources();
        }

        const notesJson = JSON.stringify(data.notes);
        if (notesJson !== lastNotesJson) {
          lastNotesJson = notesJson;
          renderNotes(data.notes || []);
        }
      } catch {}
    }

    async function deleteFile(fileId, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/api/slugs/${SLUG}/files/${fileId}`, {method: 'DELETE'});
        if (res.ok || res.status === 204) {
          await refreshFiles();
        }
      } catch {
        btn.disabled = false;
      }
    }

    // Upload a single file using the presign → S3 PUT → confirm flow
    async function uploadFile(file) {
      const statusEl  = document.getElementById('upload-status');
      const barEl     = document.getElementById('upload-bar');
      const msgEl     = document.getElementById('upload-msg');
      const nameEl    = document.getElementById('upload-filename');
      const errorEl   = document.getElementById('upload-error');

      errorEl.style.display  = 'none';
      statusEl.style.display = 'block';
      nameEl.textContent     = `Uploading: ${file.name}`;
      barEl.style.width      = '0%';
      msgEl.textContent      = '';

      // Step 1: request a presigned PUT URL
      let presignData;
      try {
        const res = await fetch(`/api/slugs/${SLUG}/files/presign`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({filename: file.name, size_bytes: file.size}),
        });
        if (!res.ok) {
          statusEl.style.display = 'none';
          const body = await res.json().catch(() => ({}));
          errorEl.textContent = body.detail || `Upload failed (HTTP ${res.status}).`;
          errorEl.style.display = 'block';
          return;
        }
        presignData = await res.json();
      } catch {
        statusEl.style.display = 'none';
        errorEl.textContent = 'Network error during upload.';
        errorEl.style.display = 'block';
        return;
      }

      const {file_id, upload_url} = presignData;

      // Step 2: PUT the file directly to S3 with progress tracking
      const uploadOk = await new Promise((resolve) => {
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const pct = (e.loaded / e.total * 100).toFixed(1);
            barEl.style.width = `${pct}%`;
            msgEl.textContent = `${fmtBytes(e.loaded)} / ${fmtBytes(e.total)}`;
          }
        });

        xhr.addEventListener('load', () => resolve(xhr.status >= 200 && xhr.status < 300));
        xhr.addEventListener('error', () => resolve(false));

        xhr.open('PUT', upload_url);
        // Send the raw file bytes — no FormData, no Content-Type override needed
        xhr.send(file);
      });

      if (!uploadOk) {
        statusEl.style.display = 'none';
        errorEl.textContent = 'Upload to storage failed. Please try again.';
        errorEl.style.display = 'block';
        return;
      }

      // Step 3: tell the server the upload is done (records MD5 from S3 ETag)
      try {
        const res = await fetch(`/api/slugs/${SLUG}/files/${file_id}/confirm`, {method: 'POST'});
        if (!res.ok) {
          statusEl.style.display = 'none';
          const body = await res.json().catch(() => ({}));
          errorEl.textContent = body.detail || `Confirm failed (HTTP ${res.status}).`;
          errorEl.style.display = 'block';
          return;
        }
      } catch {
        statusEl.style.display = 'none';
        errorEl.textContent = 'Network error confirming upload.';
        errorEl.style.display = 'block';
        return;
      }

      barEl.style.width = '100%';
      msgEl.textContent = 'Done!';
      await refreshFiles();
      setTimeout(() => { statusEl.style.display = 'none'; }, 1500);
    }

    async function uploadFiles(files) {
      for (const file of files) {
        await uploadFile(file);
      }
    }

    // Notes
    const URL_RE = /^https?:\/\//i;

    document.getElementById('note-input').addEventListener('input', function() {
      const hint = document.getElementById('note-hint');
      hint.textContent = URL_RE.test(this.value.trim()) ? 'URL detected — a link preview will be fetched.' : '';
    });

    async function submitNote() {
      const input = document.getElementById('note-input');
      const btn   = document.getElementById('note-btn');
      const errEl = document.getElementById('note-error');
      const content = input.value.trim();
      if (!content) return;

      btn.disabled = true;
      errEl.style.display = 'none';

      try {
        const res = await fetch(`/api/slugs/${SLUG}/notes`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({content}),
        });
        if (res.status === 201) {
          input.value = '';
          document.getElementById('note-hint').textContent = '';
          await refreshFiles();
        } else {
          const body = await res.json().catch(() => ({}));
          errEl.textContent = body.detail || `Error ${res.status}`;
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('note-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitNote();
    });

    function renderNotes(notes) {
      const section  = document.getElementById('notes-section');
      const listEl   = document.getElementById('note-list');
      const countEl  = document.getElementById('note-count');

      if (!notes || !notes.length) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      countEl.textContent = notes.length === 1 ? '1 note' : `${notes.length} notes`;

      listEl.innerHTML = notes.map(n => {
        const isUrl = n.note_type === 'url';
        const preview = isUrl ? buildPreview(n) : '';
        return `
          <div class="note-item" data-note-id="${n.id}">
            <div class="note-body">
              ${isUrl
                ? `<a class="link-preview" href="${escHtml(n.content)}" target="_blank" rel="noopener noreferrer">${preview}</a>`
                : `<p class="note-text">${escHtml(n.content)}</p>`
              }
              <p class="note-meta">${timeAgo(n.created_at)}</p>
            </div>
            <button class="btn btn-danger" style="flex-shrink:0;align-self:flex-start" onclick="deleteNote('${n.id}', this)">Delete</button>
          </div>
        `;
      }).join('');
    }

    function buildPreview(n) {
      const img = n.preview_image
        ? `<img class="link-preview-img" src="${escHtml(n.preview_image)}" alt="" onerror="this.style.display='none'">`
        : '';
      const domain = n.preview_domain ? `<p class="link-preview-domain">${escHtml(n.preview_domain)}</p>` : '';
      const title  = n.preview_title  ? `<p class="link-preview-title">${escHtml(n.preview_title)}</p>` : `<p class="link-preview-title">${escHtml(n.content)}</p>`;
      const desc   = n.preview_description ? `<p class="link-preview-desc">${escHtml(n.preview_description)}</p>` : '';
      return `${img}<div class="link-preview-body">${domain}${title}${desc}</div>`;
    }

    function timeAgo(ts) {
      const diff = Math.floor(Date.now() / 1000 - ts);
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    async function deleteNote(noteId, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/api/slugs/${SLUG}/notes/${noteId}`, {method: 'DELETE'});
        if (res.ok || res.status === 204) await refreshFiles();
      } catch {
        btn.disabled = false;
      }
    }

    // Drop zone
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--accent)';
      dropZone.style.background  = 'rgba(108,99,255,0.06)';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = 'var(--border)';
      dropZone.style.background  = '';
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--border)';
      dropZone.style.background  = '';
      const files = Array.from(e.dataTransfer.files);
      if (files.length) uploadFiles(files);
    });

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const files = Array.from(fileInput.files);
      if (files.length) uploadFiles(files);
      fileInput.value = '';
    });

    document.getElementById('qr-details').addEventListener('toggle', function() {
      if (this.open && !this.dataset.ready) {
        this.dataset.ready = '1';
        new QRCode(document.getElementById('qr-code'), {
          text: window.location.origin + '/' + SLUG,
          width: 180,
          height: 180,
        });
      }
    });

    init();
  </script>

  <footer style="margin-top:2.5rem;color:var(--muted);font-size:0.8rem">
    <a href="/privacy" style="color:var(--muted);text-decoration:none">Privacy policy</a>
  </footer>
</body>
</html>
